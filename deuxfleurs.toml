[[cors]]
allowed_origins = "*"
allowed_methods = ["GET", "POST"]
allowed_headers = "*"

[[headers]]
for = ["**/*.woff2", "**/*.woff", "**/*.svg", "**/*.ttf", "**/*.otf", "**/*.eot", "**/*.js", "**/*.css"]
compress = "gzip"
[headers.values]
Cache-Control = "max-age=31536000, no-transform, public"

[[headers]]
for = ["**/*.png", "**/*.jpg", "**/*.jpeg", "**/*.gif", "**/*.webp"]
[headers.values]
Cache-Control = "max-age=31536000, no-transform, public"

[[redirects]]
from = "/villes/bankochain-1/index.html"
to = "/villes/cimetiere-du-nft/"

[[redirects]]
from = "/villes/kryptogarden/index.html"
to = "/villes/kryptogarten/"

[[redirects]]
from = "/lire/index.html"
to = "/lire-old/"

[[redirects]]
from = "/en-une-page/index.html"
to = "/lire-old/"

